name: Daily Quote Commit

on:
  schedule:
    - cron: '30 3 * * *'   # 3:30 UTC = 9:00 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-quote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch a random quote
        run: |
          RESPONSE=$(curl -sSL --fail "https://dummyjson.com/quotes/random")
          QUOTE=$(echo "$RESPONSE" | jq -r '.quote')
          AUTHOR=$(echo "$RESPONSE" | jq -r '.author')
          DATE=$(date -u +'%Y-%m-%d')

          if [ -z "$QUOTE" ] || [ "$QUOTE" == "null" ]; then
            QUOTE="The best way to get started is to quit talking and begin doing."
            AUTHOR="Walt Disney"
          fi

          echo "" >> quotes.md
          echo "### $DATE" >> quotes.md
          echo "> $QUOTE" >> quotes.md
          echo "— $AUTHOR" >> quotes.md

      - name: Commit and push
        run: |
          git config --local user.email "12345678+VishnuGadekar7@users.noreply.github.com"
          git config --local user.name "VishnuGadekar7"
          git add quotes.md
          git commit -m "Quote of the day: $(date -u +'%Y-%m-%d')" || echo "Nothing to commit"
          git push
